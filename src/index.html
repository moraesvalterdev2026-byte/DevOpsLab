<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXES Bank - Sinal de sorte é contar com AXES Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="logo">AXES</div>
        <button class="cta-header">Quero ser AXES</button>
    </header>

    <main>
        <section class="hero">
            <h1>Axes Bank</h1>
            <button class="cta-primary">Conheça as vantagens</button>
            
            <div class="login-card">
                <h2>Acesse sua conta</h2>
                <input type="text" placeholder="Digite seu CPF" maxlength="14">
                <button class="btn-continuar">Continuar</button>
                
                <div class="card-footer">
                    <a href="#">Esqueci minha senha</a>
                    <p><small>🔒 Ambiente 100% seguro</small></p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
