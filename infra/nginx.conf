events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream axes_backend {
        server axes_app:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Servir arquivos estáticos do frontend mapeados pelo volume
        root /usr/share/nginx/html;
        index login.html index.html index.htm;

        # Encaminha chamadas de API preservando o caminho completo /api/...
        location /api/ {
            proxy_pass http://axes_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Fallback para as páginas estáticas
        location / {
            try_files $uri $uri/ /login.html;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}