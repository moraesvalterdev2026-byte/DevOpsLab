services:
  # Núcleo de Banco de Dados
  db:
    image: postgres:15-alpine
    container_name: axes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: axes_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # Testa se o PostgreSQL está pronto para aceitar conexões.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${POSTGRES_DB:-axes_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - axes_network

  # Aplicação Node.js (AXES Bank)
  app:
    build:
      context: ../
      dockerfile: ./Dockerfile
    container_name: axes_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-admin}:${DB_PASSWORD:-password}@db:5432/axes_db
      API_BASE_URL: http://localhost:3000 # URL base para o frontend consumir a API
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_DB: axes_db
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the local source code, but exclude node_modules
      - ../:/app
      # Use a named volume for node_modules to prevent local-to-container conflicts
      - node_modules:/app/node_modules
    networks:
      - axes_network

  # Agente de IA para Governança e Observabilidade
  ai:
    image: ollama/ollama:latest
    container_name: axes_ai_agent
    restart: unless-stopped
    entrypoint: ["bash", "/app/entrypoint.sh"]
    # Garante que o script de entrypoint tenha permissões de root para executar
    user: "0:0"
    volumes:
      - ollama_data:/root/.ollama
      # O caminho de origem é relativo ao docker-compose.yml (./infra)
      - ./ai/entrypoint.sh:/app/entrypoint.sh
    ports:
      - "11434:11434"
    networks:
      - axes_network

networks:
  axes_network:
    driver: bridge

volumes:
  db_data:
  # Define the named volume for node_modules
  node_modules:
  ollama_data: