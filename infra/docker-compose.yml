services:
  # Núcleo de Banco de Dados
  db:
    image: postgres:15-alpine
    container_name: axes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: axes_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # Testa se o PostgreSQL está pronto para aceitar conexões.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${POSTGRES_DB:-axes_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - axes_network

  # Aplicação Node.js (AXES Bank)
  app:
    build:
      context: ../
      dockerfile: ./infra/Dockerfile
    container_name: axes_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-admin}:${DB_PASSWORD:-password}@db:5432/axes_db
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_DB: axes_db
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the local source code, but exclude node_modules
      - ../:/app
      # Use a named volume for node_modules to prevent local-to-container conflicts
      - node_modules:/app/node_modules
    networks:
      - axes_network

networks:
  axes_network:
    driver: bridge

volumes:
  db_data:
  # Define the named volume for node_modules
  node_modules: