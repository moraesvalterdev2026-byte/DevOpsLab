services:
  # Núcleo de Banco de Dados
  db:
    image: postgres:15-alpine
    container_name: axes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-axes_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-axes_pass}
      POSTGRES_DB: axes_db
    volumes:
      - axes_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Testa se o PostgreSQL está pronto para aceitar conexões.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-axes_user} -d ${POSTGRES_DB:-axes_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - axes_network

  # Aplicação Node.js (AXES Bank)
  app:
    build:
      context: ../
      dockerfile: ./Dockerfile
    container_name: axes_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-axes_user}:${DB_PASSWORD:-axes_pass}@db:5432/axes_db
      API_BASE_URL: http://localhost:3000 # URL base para o frontend consumir a API
      POSTGRES_USER: ${DB_USER:-axes_user}
      POSTGRES_DB: axes_db
      POSTGRES_PASSWORD: ${DB_PASSWORD:-axes_pass}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Monta o código-fonte local para live-reloading.
      - ../:/app
      # Usa um volume nomeado para isolar o node_modules do contêiner,
      # evitando que a pasta local sobrescreva as dependências instaladas no build.
      - axes_app_node_modules:/app/node_modules
    networks:
      - axes_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Reverse Proxy para segurança e centralização de acesso.
  proxy:
    image: nginx:1.25-alpine
    container_name: axes_proxy
    restart: unless-stopped
    ports:
      - "80:80" # Expõe apenas a porta 80 para o mundo externo.
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - axes_network
    depends_on:
      - ai

  # Agente de IA para Governança e Observabilidade
  ai:
    image: ollama/ollama:latest
    container_name: axes_ai_agent
    restart: unless-stopped
    entrypoint: ["bash", "/app/entrypoint.sh"]
    environment:
      IAM_USER: "${IAM_USER?Error: IAM_USER is not set. Please define it in your environment.}"
      IAM_TOKEN: "${IAM_TOKEN?Error: IAM_TOKEN is not set. Please define it in your environment.}"
    # Revertendo para o usuário root, pois a imagem base não suporta a criação de usuários.
    user: "0:0"
    volumes:
      # O volume de dados do Ollama.
      - axes_ai_ollama_data:/root/.ollama
      # O caminho de origem é relativo ao docker-compose.yml (./infra)
      - ./ai/entrypoint.sh:/app/entrypoint.sh
    # Conecta o container a duas redes:
    # 'axes_network' para comunicação interna com o proxy.
    # 'default' (implícita) para permitir acesso à internet para baixar modelos.
    networks: [ "axes_network", "default" ]
    healthcheck:
      # Usa o CLI nativo do ollama para verificar a saúde, evitando a dependência do curl.
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  axes_network:
    driver: bridge

volumes:
  axes_db_data:
  axes_app_node_modules:
  axes_ai_ollama_data: