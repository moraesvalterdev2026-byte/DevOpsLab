<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Conta - AXES Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/utils.js" defer></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/api.js" defer></script>
    <script src="/js/register.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <section class="hero">
            <div class="login-card" style="margin-top: 80px;">
                <h2>Crie sua conta no AXES Bank</h2>
                <label for="name-input" class="sr-only">Nome Completo</label>
                <input type="text" id="name-input" placeholder="Nome Completo" autocomplete="name">

                <label for="cpf-input" class="sr-only">Digite seu CPF</label>
                <input type="text" id="cpf-input" placeholder="Digite seu CPF" maxlength="14" autocomplete="off">

                <label for="password-input" class="sr-only">Crie uma senha</label>
                <input type="password" id="password-input" placeholder="Crie uma senha" autocomplete="new-password">

                <label for="confirm-password-input" class="sr-only">Confirme sua senha</label>
                <input type="password" id="confirm-password-input" placeholder="Confirme sua senha" autocomplete="new-password">

                <button class="btn-continuar" id="btn-register">
                    <span class="btn-text">Criar Conta</span>
                </button>
            </div>
        </section>
    </main>
</body>
</html>
