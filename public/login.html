<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesse sua Conta - AXES Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/utils.js" defer></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/api.js" defer></script>
    <script src="/js/auth.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <section class="hero">
            <div class="login-card" style="margin-top: 80px;">
                <h2>Acesse sua conta</h2>
                <label for="cpf-input" class="sr-only">Digite seu CPF</label>
                <input type="text" id="cpf-input" placeholder="Digite seu CPF" maxlength="14" autocomplete="off">
                <button class="btn-continuar" id="btn-login">
                    <span class="btn-text">Continuar</span>
                </button>
                <div class="card-footer">
                    <a href="#">Esqueci minha senha</a>
                    <p><small>🔒 Ambiente 100% seguro</small></p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
