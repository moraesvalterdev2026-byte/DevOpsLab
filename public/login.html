
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - AXES Bank</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <main class="container">
    <section class="card login-card mx-auto" style="max-width:420px;margin-top:4rem;">
      <div class="card-header">
        <h2 class="card-title">Acesse sua conta</h2>
        <p class="card-subtitle">Digite seu CPF ou e-mail</p>
      </div>
      <div class="card-body">
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="identifier" class="label">CPF ou E-mail</label>
            <input id="identifier" name="identifier" class="input" autocomplete="username" required />
            <span class="form-error" id="identifierError" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="password" class="label">Senha</label>
            <input id="password" name="password" type="password" class="input" autocomplete="current-password" required />
            <span class="form-error" id="passwordError" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block" id="btnLogin">Entrar</button>
          </div>
        </form>
      </div>
      <div class="card-footer">
        <a href="/register.html" class="btn btn-ghost">Criar conta</a>
      </div>
    </section>
  </main>
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
