<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AXES Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-main">
        <div class="dashboard-header">
            <h1>Bem-vindo, <span id="user-email">...</span>!</h1>
            <button id="btn-logout">Sair</button>
        </div>

        <div id="accounts-list">
            <h2>Suas Contas</h2>
            <p>Carregando contas...</p>
        </div>

        <div id="transfer-form">
            <h2>Nova Transferência</h2>
            <form id="transactionForm">
                <select id="from-account" required></select>
                <input type="number" id="to-account" placeholder="ID da Conta de Destino" required />
                <input type="number" id="amount" placeholder="Valor" step="0.01" required />
                <button type="submit">Transferir</button>
            </form>
            <div id="transfer-message"></div>
        </div>

        <div id="transaction-history">
            <h2>Histórico de Transações</h2>
            <p>Carregando histórico...</p>
        </div>
    </main>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
