<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AXES Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/utils.js" defer></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/api.js" defer></script>
    <script src="/js/dashboard.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="dashboard-main">
        <div class="dashboard-header">
            <h1>Bem-vindo, <span id="user-name">Cliente</span>!</h1>
            <button class="btn-logout" id="btn-logout">Sair</button>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card" id="balance-component">
                <h2>Saldo em Conta</h2>
                <p class="balance-loading">Carregando...</p>
            </div>

            <div class="dashboard-card" id="statement-component">
                <h2>Últimas Transações</h2>
                <p class="statement-loading">Carregando extrato...</p>
            </div>
        </div>
    </main>
</body>
</html>
