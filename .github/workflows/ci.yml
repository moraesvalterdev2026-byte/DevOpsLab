name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: axes_user
          POSTGRES_PASSWORD: axes_pass
          POSTGRES_DB: axes_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U axes_user -d axes_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Copy test env
        run: cp .env.test .env

      - name: Wait for DB ready
        run: |
          echo "Esperando Postgres aceitar conexões..."
          for i in {1..15}; do
            if pg_isready -h db -U axes_user -d axes_db; then
              echo "Banco pronto!"
              exit 0
            fi
            sleep 5
          done
          echo "Banco não ficou pronto a tempo."
          exit 1
        env:
          PGPASSWORD: axes_pass

      - name: Run tests
        env:
          DB_USER: axes_user
          DB_PASSWORD: axes_pass
          DB_NAME: axes_db
          DB_HOST: db
          DB_PORT: 5432
        run: npm test

  # 🔍 Agente de Governança (opcional)
