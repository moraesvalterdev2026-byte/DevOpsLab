# .github/workflows/ci.yml

name: Continuous Integration

# Triggers: Run this workflow on pushes to the main branch and on pull requests targeting the main branch.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job to build and test the application
  build:
    runs-on: ubuntu-latest

    # Service containers to run with the job
    services:
      # Label used to access the service container
      postgres:
        image: postgres:16.2
        # Environment variables for the postgres service
        env:
          POSTGRES_USER: axes_user
          POSTGRES_PASSWORD: axes_pass
          POSTGRES_DB: axes_db
        ports:
          - 5432:5432
        # Health check to wait until postgres is ready
        options: >-
          --health-cmd="pg_isready -U axes_user -d axes_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          POSTGRES_USER: axes_user
          POSTGRES_PASSWORD: axes_pass
          POSTGRES_DB: axes_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432 # Port is fixed due to the 'ports' mapping above

      - name: Security audit
        run: npm audit --production