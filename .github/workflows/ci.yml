name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: axes_user
          POSTGRES_PASSWORD: axes_pass
          POSTGRES_DB: axes_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U axes_user -d axes_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Copy test env
        run: cp .env.test .env

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test